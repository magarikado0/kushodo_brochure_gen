services:
  backend:
    build:
      context: ..
      dockerfile: webapp/backend/Dockerfile
    restart: unless-stopped
    expose:
      - "8000"

  frontend:
    build:
      context: ..
      dockerfile: webapp/frontend/Dockerfile
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
